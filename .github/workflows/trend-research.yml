name: ArXiv Trend Research

on:
  # 仅支持手动触发，填入关键词和时间范围即可运行
  workflow_dispatch:
    inputs:
      keywords:
        description: |
          搜索关键词，空格分隔多个词（每个空格分隔的 token 视为一个独立关键词）。
          若关键词本身含空格，请用引号包裹，如："reduction map" "quantum error"
        required: true
      date_from:
        description: '起始日期 YYYY-MM-DD（留空则使用配置默认范围）'
        required: false
        default: ''
      date_to:
        description: '截止日期 YYYY-MM-DD（留空则默认为今天）'
        required: false
        default: ''
      categories:
        description: 'ArXiv 分类过滤，空格分隔，如：quant-ph cond-mat（留空不限制分类）'
        required: false
        default: ''
      sort_order:
        description: '论文时间排序方向'
        required: false
        default: 'ascending'
        type: choice
        options:
          - ascending
          - descending
      max_results:
        description: '最大论文数（留空使用配置默认值）'
        required: false
        default: ''

jobs:
  trend-research:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          CHEAP_LLM__API_KEY=${{ secrets.CHEAP_LLM_API_KEY }}
          CHEAP_LLM__BASE_URL=${{ secrets.CHEAP_LLM_BASE_URL }}
          CHEAP_LLM__MODEL_NAME=${{ secrets.CHEAP_LLM_MODEL_NAME }}
          CHEAP_LLM__TEMPERATURE=${{ secrets.CHEAP_LLM_TEMPERATURE }}
          SMART_LLM__API_KEY=${{ secrets.SMART_LLM_API_KEY }}
          SMART_LLM__BASE_URL=${{ secrets.SMART_LLM_BASE_URL }}
          SMART_LLM__MODEL_NAME=${{ secrets.SMART_LLM_MODEL_NAME }}
          SMART_LLM__TEMPERATURE=${{ secrets.SMART_LLM_TEMPERATURE }}
          OPENALEX_EMAIL=${{ secrets.OPENALEX_EMAIL }}
          OPENALEX_API_KEY=${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY=${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          ENABLE_NOTIFICATIONS=${{ secrets.ENABLE_NOTIFICATIONS }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_TO=${{ secrets.SMTP_TO }}
          WECHAT_WEBHOOK_URL=${{ secrets.WECHAT_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL=${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET=${{ secrets.DINGTALK_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL=${{ secrets.GENERIC_WEBHOOK_URL }}
          ENVEOF

      - name: Create data directories
        run: |
          mkdir -p data/reports/trend_research/markdown \
                   data/reports/trend_research/html \
                   data/history data/keywords data/run logs

      - name: Run trend research
        run: |
          python - << 'PYEOF'
          import subprocess, sys, shlex

          # 使用 shlex.split 正确处理含空格的引号关键词
          # 例：输入 '"reduction map" entanglement' → ['reduction map', 'entanglement']
          keywords = shlex.split("""${{ github.event.inputs.keywords }}""")
          if not keywords:
              print("错误: 关键词不能为空")
              sys.exit(1)

          cmd = [sys.executable, "main.py", "--mode", "trend_research",
                 "--keywords"] + keywords

          date_from   = "${{ github.event.inputs.date_from }}".strip()
          date_to     = "${{ github.event.inputs.date_to }}".strip()
          categories  = shlex.split("${{ github.event.inputs.categories }}")
          sort_order  = "${{ github.event.inputs.sort_order }}".strip()
          max_results = "${{ github.event.inputs.max_results }}".strip()

          if date_from:   cmd += ["--date-from", date_from]
          if date_to:     cmd += ["--date-to", date_to]
          if categories:  cmd += ["--categories"] + categories
          if sort_order:  cmd += ["--sort-order", sort_order]
          if max_results: cmd += ["--max-results", max_results]

          print("Running:", " ".join(shlex.quote(a) for a in cmd))
          sys.exit(subprocess.run(cmd).returncode)
          PYEOF
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trend-reports-${{ github.run_number }}
          path: |
            data/reports/trend_research/
            logs/
          retention-days: 30
